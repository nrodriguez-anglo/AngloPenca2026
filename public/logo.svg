<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Pelota de fútbol -->
  <circle cx="256" cy="230" r="100" fill="url(#ballGrad)" stroke="#1E2535" stroke-width="3"/>

  <!-- Pentágonos negros de la pelota -->
  <g fill="#1E2535">
    <!-- Centro -->
    <polygon points="256,180 276,200 270,228 242,228 236,200"/>
    <!-- Superior -->
    <polygon points="256,130 268,148 256,165 244,148"/>
    <!-- Superior derecha -->
    <polygon points="310,165 320,185 305,205 285,198 282,175"/>
    <!-- Superior izquierda -->
    <polygon points="202,165 212,148 228,175 225,198 205,205"/>
    <!-- Inferior derecha -->
    <polygon points="310,295 320,275 305,255 285,262 282,285"/>
    <!-- Inferior izquierda -->
    <polygon points="202,295 212,312 228,285 225,262 205,255"/>
  </g>

  <!-- Copa del Mundo estilizada -->
  <g transform="translate(256, 380)" filter="url(#shadow)">
    <!-- Base -->
    <rect x="-30" y="20" width="60" height="12" rx="3" fill="url(#gold)"/>
    <!-- Cuerpo de la copa -->
    <path d="M-25,20 L-15,-10 Q-20,-30 0,-45 Q20,-30 15,-10 L25,20 Z" fill="url(#gold)" stroke="#B45309" stroke-width="1.5"/>
    <!-- Líneas decorativas -->
    <path d="M-18,5 Q0,-5 18,5" fill="none" stroke="#B45309" stroke-width="1" opacity="0.6"/>
    <path d="M-12,-5 Q0,-15 12,-5" fill="none" stroke="#B45309" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Texto "2026" -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#F59E0B" letter-spacing="4">2026</text>

  <!-- Estrellas decorativas -->
  <g fill="#F59E0B" opacity="0.8">
    <polygon points="100,100 105,115 120,115 108,125 112,140 100,130 88,140 92,125 80,115 95,115"/>
    <polygon points="412,100 417,115 432,115 420,125 424,140 412,130 400,140 404,125 392,115 407,115"/>
  </g>
</svg>
